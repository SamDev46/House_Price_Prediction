<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>AI House Price Predictor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<header class="hero">
<h1>🏠 AI House Price Predictor</h1>
<p>Predict real estate prices using Machine Learning</p>
</header>

<div class="container">

<div class="glass-card">

<h2>Property Details</h2>

<form id="prediction-form">

<div class="grid">

<div class="input-group">
<label>Area (sq ft)</label>
<input type="number" name="Area" required>
</div>

<div class="input-group">
<label>BHK</label>
<select name="BHK">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>
</div>

<div class="input-group">
<label>Bathrooms</label>
<select name="Bathroom">
<option>1</option>
<option>2</option>
<option>3</option>
</select>
</div>

<div class="input-group">
<label>Parking</label>
<select name="Parking">
<option>0</option>
<option>1</option>
<option>2</option>
</select>
</div>

<div class="input-group">
<label>Furnishing</label>
<select name="Furnishing">
<option>Unfurnished</option>
<option>Semi-Furnished</option>
<option>Furnished</option>
</select>
</div>

<div class="input-group">
<label>Locality</label>
<select name="Locality">
    {% for loc in localities %}
<option value="{{ loc }}">{{ loc }}</option>
{% endfor %}
</select>
</div>


<div class="input-group">
<label>Status</label>
<select name="Status">
<option>Ready_to_move</option>
<option>Almost_ready</option>
</select>
</div>

<div class="input-group">
<label>Transaction</label>
<select name="Transaction">
<option>New_Property</option>
<option>Resale</option>
</select>
</div>

<div class="input-group">
<label>Property Type</label>
<select name="Type">
<option>Apartment</option>
<option>Builder_Floor</option>
</select>
</div>

<div class="input-group">
<label>Price per Sq Ft</label>
<input type="number" name="Per_Sqft" placeholder="e.g. 12000" required>
</div>

</div>

<button type="button" class="predict-btn">Predict Price</button>

</form>

</div>

<div class="glass-card result-card">

<h2>Predicted Price</h2>

<div id="loader" class="loader" style="display:none;"></div>

<h1 id="price">₹ --</h1>
<div id="insightBox" class="insight-box">
<p id="insightText"></p>
</div>
<canvas id="priceChart" height="250"></canvas>
<div id="map"></div>

<h3>Feature Importance</h3>
<canvas id="featureChart" height="200"></canvas>

</div>

</div>

<footer>
<p>Machine Learning Real Estate Prediction System</p>
</footer>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
